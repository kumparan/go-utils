version: "2"
run:
  tests: true
  allow-parallel-runners: false
output:
  path-prefix: ""
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - gosec
    - govet
    - ineffassign
    - nilerr
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - errcheck
          - gocyclo
          - gosec
        path: _test\.go
      - linters:
          - gosec
        text: weak cryptographic primitive
      - linters:
          - gosec
        text: "G115:"
      - linters:
          - gosec
        text: "G115:"
      - linters:
          - gosec
        text: "G117:"
      - linters:
          - gosec
        text: "G117:"
      - linters:
          - gosec
        text: "G704:"
      - linters:
          - gosec
        text: "G704:"
      - linters:
          - gosec
        text: "G505:"
      - linters:
          - staticcheck
        text: "SA9003:"
      - linters:
          - lll
        source: "^//go:generate "
      - path: (.+)\.go$
        text: should have a package comment
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  fix: true
severity:
  default: error
  rules:
    - linters:
        - dupl
      severity: info
formatters:
  enable:
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
