name: Go

on: [pull_request]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.26.0

    - name: Golangci-lint
      uses: golangci/golangci-lint-action@v7
      with:
        version: v2.10.1

    - name: Test
      run: go test -v ./...

    - name: Build
      run: go build -v ./...
